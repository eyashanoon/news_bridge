services:
  mysql:
    image: mysql:8.4
    container_name: newscrawler-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 0000
      MYSQL_DATABASE: news_crawler
      MYSQL_USER: news_user
      MYSQL_PASSWORD: news_pass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p0000"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
